services:
  - type: web
    name: svacs-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 dashboard.app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: FLASK_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: http://localhost:5173,http://127.0.0.1:5173

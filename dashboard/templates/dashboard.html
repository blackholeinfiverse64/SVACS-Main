<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        SVACS Dashboard
    </title>

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    >

    <style>

        body {

            background-color: #111827;
            color: white;
        }

        .section-title {

            margin-top: 20px;
            margin-bottom: 20px;
        }

        .card {

            border-radius: 12px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.3);
        }

        .dashboard-header {

            text-align: center;
            margin-bottom: 30px;
        }

        .metrics-box {

            margin-bottom: 25px;
        }

    </style>

</head>

<body>

<div class="container-fluid p-4">

    <!-- ========================================= -->
    <!-- HEADER -->
    <!-- ========================================= -->

    <div class="dashboard-header">

        <h1>
            SVACS LIVE DASHBOARD
        </h1>

        <p>
            Real-Time Telemetry + Replay + Contract Monitoring
        </p>

    </div>


    <!-- ========================================= -->
    <!-- METRICS -->
    <!-- ========================================= -->

    <div
        id="metrics-container"
        class="metrics-box"
    >

    </div>


    <!-- ========================================= -->
    <!-- EXECUTIONS + TELEMETRY -->
    <!-- ========================================= -->

    <div class="row">

        <!-- EXECUTIONS -->

        <div class="col-md-6">

            <h3 class="section-title">

                Executions

            </h3>

            <div id="execution-container">

            </div>

        </div>


        <!-- TELEMETRY -->

        <div class="col-md-6">

            <h3 class="section-title">

                Telemetry

            </h3>

            <div id="telemetry-container">

            </div>

        </div>

    </div>


    <!-- ========================================= -->
    <!-- REJECTIONS -->
    <!-- ========================================= -->

    <hr class="mt-5 mb-4">

    <h3 class="section-title">

        Rejections

    </h3>

    <div id="rejection-container">

    </div>

</div>


<!-- ========================================= -->
<!-- DASHBOARD JS -->
<!-- ========================================= -->

<script src="/static/dashboard.js"></script>

</body>

</html>
